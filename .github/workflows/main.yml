name: Lint

on:
  push:
    branches: ["main", master]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-go-env

      - name: Run make lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-go-env

      - name: Run test
        run: make test
